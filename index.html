<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精選調酒酒譜口袋書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-amber-50 min-h-screen font-sans text-gray-800">

    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <h1 class="text-3xl font-bold text-center text-amber-800 mb-8">🍹 調酒酒譜口袋書</h1>
        
        <div class="flex gap-2 mb-8">
            <input type="text" id="search-input" placeholder="輸入調酒英文名稱 (例如: Margarita, Mojito)" 
                   class="flex-1 px-4 py-2 border-2 border-amber-300 rounded-lg focus:outline-none focus:border-amber-500">
            <button onclick="searchCocktail()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-lg transition">搜尋</button>
        </div>

        <div id="status-msg" class="text-center text-gray-600 mb-4 hidden">搜尋中...</div>

        <div id="cocktail-card" class="bg-white rounded-xl shadow-lg overflow-hidden hidden fade-in">
            <img id="drink-img" src="" alt="Drink Image" class="w-full h-64 object-cover">
            <div class="p-6">
                <h2 id="drink-name" class="text-2xl font-bold text-amber-900 mb-2"></h2>
                <p class="text-sm font-semibold text-amber-700 mb-4">主成份: <span id="drink-ingredient" class="text-gray-600 font-normal"></span></p>
                <p class="text-gray-700 mb-6" id="drink-instructions"></p>
                
                <button onclick="saveToGoogleSheet()" id="save-btn"
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg transition flex justify-center items-center gap-2">
                    📁 收藏到我的 Google 試算表
                </button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 請替換成你剛剛在 GAS 部署後取得的 Web App 網址
        const GAS_WEB_APP_URL = "YOUR_GAS_WEB_APP_URL_HERE"; 
        let currentDrinkData = null;

        // 2. 呼叫 API 自動填入資料
        async function searchCocktail() {
            const keyword = document.getElementById('search-input').value.trim();
            if(!keyword) return alert('請輸入調酒名稱！');

            const statusMsg = document.getElementById('status-msg');
            const card = document.getElementById('cocktail-card');
            
            statusMsg.classList.remove('hidden');
            statusMsg.innerText = "正在調配酒譜資料...";
            card.classList.add('hidden');

            try {
                const response = await fetch(`https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${keyword}`);
                const data = await response.json();

                if(!data.drinks) {
                    statusMsg.innerText = "找不到這款調酒，換個關鍵字試試看吧！";
                    return;
                }

                // 取得第一筆調酒資料
                const drink = data.drinks[0];
                currentDrinkData = drink; // 暫存起來供儲存使用

                // 渲染前端網頁效果
                document.getElementById('drink-img').src = drink.strDrinkThumb;
                document.getElementById('drink-name').innerText = drink.strDrink;
                document.getElementById('drink-ingredient').innerText = drink.strIngredient1 || "自訂配方";
                document.getElementById('drink-instructions').innerText = drink.strInstructions;

                statusMsg.classList.add('hidden');
                card.classList.remove('hidden'); // 淡入顯示卡片
            } catch (error) {
                statusMsg.innerText = "系統發生錯誤，請稍後再試。";
                console.error(error);
            }
        }

        // 3. 將資料透過 GAS 存入 Google Sheet
        async function saveToGoogleSheet() {
            if(!currentDrinkData || !GAS_WEB_APP_URL) return;
            
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "正在儲存到雲端...";

            try {
                // 將需要的欄位包成 JSON 傳送
                const payload = {
                    strDrink: currentDrinkData.strDrink,
                    strIngredient1: currentDrinkData.strIngredient1,
                    strInstructions: currentDrinkData.strInstructions,
                    strDrinkThumb: currentDrinkData.strDrinkThumb
                };

                // 因為跨域(CORS)問題，使用 no-cors 模式發送
                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // 由於 no-cors 無法讀取回傳值，通常只要沒報錯就是成功
                alert('🎉 成功收藏至 Google 試算表！');
            } catch (error) {
                alert('儲存失敗，請檢查 GAS 設定');
                console.error(error);
            } {
                saveBtn.disabled = false;
                saveBtn.innerText = "📁 收藏到我的 Google 試算表";
            }
        }
    </script>
</body>
